# freud-lacan-local — orquestração local
# Tudo roda na máquina do usuário. Nada sai para a internet além do download
# inicial de imagens Docker e de modelos do Ollama.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: flc-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: flc-api
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./src:/app
      - app-data:/data
      - ./corpus:/corpus:ro

  # Frontend mínimo será adicionado na Fase 1 do roadmap.
  # Por ora, use http://localhost:8000/docs para interagir com a API.

volumes:
  ollama-data:
  app-data:
